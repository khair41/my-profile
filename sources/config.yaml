request_delay: 1.0   # seconds between HTTP requests

rss_feeds:
  - name: "Hacker News"
    url: "https://news.ycombinator.com/rss"
    enabled: true
  - name: "dev.to"
    url: "https://dev.to/feed"
    enabled: true
  - name: "ArXiv CS.AI"
    url: "https://arxiv.org/rss/cs.AI"
    enabled: true
  - name: "Simon Willison"
    url: "https://simonwillison.net/atom/everything/"
    enabled: true
  - name: "The Pragmatic Engineer"
    url: "https://newsletter.pragmaticengineer.com/feed"
    enabled: true

  # AI labs & research
  - name: "OpenAI Blog"
    url: "https://openai.com/news/rss.xml"
    enabled: true
  - name: "Google DeepMind"
    url: "https://deepmind.google/blog/rss.xml"
    enabled: true
  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    enabled: true
  - name: "Meta AI Blog"
    url: "https://ai.meta.com/blog/rss/"
    enabled: true

  # Engineering blogs
  - name: "Netflix Tech Blog"
    url: "https://netflixtechblog.com/feed"
    enabled: true
  - name: "Cloudflare Blog"
    url: "https://blog.cloudflare.com/rss/"
    enabled: true
  - name: "GitHub Engineering"
    url: "https://github.blog/category/engineering/feed/"
    enabled: true
  - name: "Stripe Engineering"
    url: "https://stripe.com/blog/engineering/feed/rss"
    enabled: true

  # AI infra & tooling
  - name: "NVIDIA Developer Blog"
    url: "https://developer.nvidia.com/blog/feed/"
    enabled: true
  - name: "AWS Machine Learning Blog"
    url: "https://aws.amazon.com/blogs/machine-learning/feed/"
    enabled: true

youtube_channels:
  # Each entry: channel_id + display name + how many recent videos to fetch
  - channel_id: "UCXv9OlKR0jYAMPfeLpNqNsg"   # Andrej Karpathy
    name: "Andrej Karpathy"
    max_videos: 3
    enabled: true
  - channel_id: "UCsBjURrPoezykLs9EqgamOA"   # Fireship
    name: "Fireship"
    max_videos: 3
    enabled: true
  - channel_id: "UC0RhatS1pyxInC00YKjjBqQ"   # Marques Brownlee (MKBHD) – swap as needed
    name: "AI Explained"
    max_videos: 3
    enabled: true

github:
  enabled: true
  max_repos: 25
  # Optional: filter by language (leave empty for all languages)
  language: ""
  # Optional: filter by time range: daily | weekly | monthly
  since: "daily"

ollama:
  summarize_model: "llama3.2:latest"
  generate_model: "qwen2.5:14b"
  timeout: 300  # seconds; raise if using large models (14B+)
